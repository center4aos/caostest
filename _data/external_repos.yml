# Registry of externally-mounted repos (git submodules) rendered as part of this site.
# Each entry is keyed by a short identifier, set as `external_repo: <key>` via a
# `_config.yml` defaults scope for the submodule's mount path.
#
# Schema:
#   <key>:
#     path: <mount path within this repo, e.g. governance/library>
#     repo: <owner/repo the submodule tracks, and where "Suggest a change" issues are filed>
#     issue_template: <optional; a template filename that exists in that repo's own
#                       .github/ISSUE_TEMPLATE/. Omit unless you're sure it'll stay in
#                       sync with that repo's own template maintenance.>
#     ancestors:
#       - title: <breadcrumb label>
#         url: <breadcrumb url>
#       - ...
#
# No entries yet — the governance repo entry is added when its submodule is mounted.

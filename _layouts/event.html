---
layout: default
---
<article class="event" aria-labelledby="page-title">
  <header class="event-header">
    <dl class="event-meta">
      <div class="event-meta-row">
        <dt>Date</dt>
        <dd><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%A, %B %-d, %Y" }}</time></dd>
      </div>
      {% if page.time %}
      <div class="event-meta-row">
        <dt>Time</dt>
        <dd>{{ page.time }}</dd>
      </div>
      {% endif %}
      {% if page.location %}
      <div class="event-meta-row">
        <dt>Location</dt>
        <dd>{{ page.location }}</dd>
      </div>
      {% endif %}
    </dl>
  </header>

  <div class="event-content">
    {{ content }}
  </div>
</article>

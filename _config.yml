title: Center for Accessibility and Open Source
tagline: Open source. Accessible to all.
email: info@caos.org
description: >-
  CAOS is a nonprofit organization led by people with disabilities
  to promote open-source accessibility worldwide.
baseurl: "/caostest"
url: "https://caos.org"
repo: center4aos/caostest
github_username: center4aos
issue_template: page-issue.md

theme: minima

minima:
  skin: auto  # respects system light/dark preference

# Page order for navigation
header_pages:
  - index.md
  - about.md
  - projects.md
  - resources.md
  - governance.md
  - support.md
  - contact.md

future: true

collections:
  events:
    output: true
    permalink: /events/:name/
    sort_by: date
  external_repo_pages:
    output: true

defaults:
  - scope:
      type: posts
    values:
      ancestors:
        - title: Blog
          url: /blog/
  - scope:
      type: events
    values:
      ancestors:
        - title: Calendar
          url: /calendar/
  - scope:
      path: "governance/library"
    values:
      layout: page
      external_repo: governance

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-titles-from-headings
  - jekyll-redirect-from

# Accessibility: ensure feed and sitemap are generated
feed:
  path: atom.xml

# Exclude dev files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - "CAOS Site Requirements.md"
  - README.md
  - node_modules
  - vendor

layout: default
title: Page Not Found
permalink: /404.html
---

<h2>Page Not Found</h2>

<p>Sorry, we couldn't find that page.</p>

<noscript>
<p>If you followed a link into the Policy Library or another external document collection, try its top-level listing page instead:</p>
<ul>
  {% for entry in site.data.external_repos %}
    {% assign mount = entry[1] %}
    {% assign mount_label = mount.ancestors | last %}
    <li><a href="{{ mount.path | prepend: "/" | append: "/" | relative_url }}">{{ mount_label.title }}</a></li>
  {% endfor %}
</ul>
</noscript>

<p><a href="{{ "/" | relative_url }}">Return to the homepage</a></p>

<script>
  (function () {
    var baseurl = "{{ site.baseurl }}";
    var path = window.location.pathname;
    if (baseurl && path.indexOf(baseurl) === 0) {
      path = path.slice(baseurl.length);
    }
    var externalRepos = {{ site.data.external_repos | jsonify }};
    for (var key in externalRepos) {
      var mountPath = "/" + externalRepos[key].path + "/";
      if (path.indexOf(mountPath) === 0) {
        window.location.replace(baseurl + mountPath);
        break;
      }
    }
  })();
</script>

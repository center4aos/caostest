{% unless page.url == "/" %}
<nav class="breadcrumb" aria-label="Breadcrumb">
  <ol>
    <li><a href="{{ "/" | relative_url }}">Home</a></li>
    {% if page.parent %}
      <li><a href="{{ page.parent_url | relative_url }}">{{ page.parent }}</a></li>
    {% endif %}
    <li><span aria-current="page">{{ page.title }}</span></li>
  </ol>
</nav>
{% endunless %}
